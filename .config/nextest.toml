[profile.default]
test-threads = "num-cpus"

[[profile.default.overrides]]
# large_payload_10mb (2 MiB payload) and concurrent_streams_100 can take up to 60 s on loaded machines
filter = 'test(large_payload_10mb) or test(concurrent_streams_100)'
slow-timeout = { period = "90s", terminate-after = 3 }

[[profile.default.overrides]]
# pool::tests spin up real QUIC connections and can flake under high UDP-socket
# pressure when the full suite runs in parallel.  Run them with retries=2 and a
# relaxed slow-timeout, and serialise them relative to each other so they don't
# contend for loopback ports.
filter = 'test(pool::tests)'
retries = 2
slow-timeout = { period = "60s", terminate-after = 3 }

[[profile.default.overrides]]
# h3 integration tests that exercise the full QUIC+H3 stack can be slow or flaky
# under high UDP-socket pressure when the full suite runs in parallel.
# h3_connection_shutdown_goaway and h3_trailers_roundtrip legitimately take ~31s;
# h3_error_response_code_mapping can take up to 90s.
filter = 'test(h3_connection_shutdown_goaway) or test(h3_trailers_roundtrip) or test(h3_error_response_code_mapping) or test(h3_responder_send_full)'
retries = 2
slow-timeout = { period = "90s", terminate-after = 2 }
